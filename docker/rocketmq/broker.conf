# 本地开发 Broker 配置（P2 RocketMQ）
brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true

# 容器内监听；宿主机经端口映射访问
listenPort = 10911
namesrvAddr = rocketmq-namesrv:9876

# 供宿主机 Python 客户端连接（backend 不在 compose 网络内时）
brokerIP1 = 127.0.0.1
